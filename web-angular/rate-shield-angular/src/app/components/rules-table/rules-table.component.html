<div class="px-8 py-4 pb-8">
  <table class="rs-table">
    <thead>
      <tr>
        <th style="width:48%">Endpoint</th>
        <th style="width:12%">Method</th>
        <th style="width:28%">Strategy</th>
        <th style="width:12%">Edit</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngIf="rulesData && rulesData.length > 0; else noRules">
        <tr *ngFor="let item of rulesData">
          <td class="font-mono text-xs text-slate-700">{{ item.endpoint }}</td>
          <td>
            <span class="badge" [ngClass]="getMethodClass(item.http_method)">{{ item.http_method }}</span>
          </td>
          <td>
            <span class="badge" [ngClass]="getStrategyClass(item.strategy)">{{ item.strategy }}</span>
          </td>
          <td>
            <button
              (click)="onEdit(item)"
              class="text-xs text-indigo-600 hover:text-indigo-800 font-medium hover:underline transition-colors">
              Edit
            </button>
          </td>
        </tr>
      </ng-container>
      <ng-template #noRules>
        <tr>
          <td colspan="4" class="py-12 text-center text-slate-400 text-sm">
            No rules yet. Click <strong class="text-slate-600">+ Add Rule</strong> to create one.
          </td>
        </tr>
      </ng-template>
    </tbody>
  </table>

  <div class="mt-5 flex justify-end gap-2">
    <app-button *ngIf="shouldShowPrev()" text="← Prev" (clicked)="onPrev()"></app-button>
    <app-button *ngIf="shouldShowNext()" text="Next →" (clicked)="onNext()"></app-button>
  </div>
</div>
