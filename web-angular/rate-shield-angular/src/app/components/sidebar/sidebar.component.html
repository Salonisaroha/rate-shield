<!-- Hamburger button (mobile only) -->
<button
  class="hamburger-btn"
  (click)="toggleSidebar()"
  aria-label="Toggle menu">
  <svg *ngIf="!isOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
  <svg *ngIf="isOpen" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<!-- Backdrop (mobile only) -->
<div *ngIf="isOpen" class="backdrop" (click)="closeSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" [class.open]="isOpen">

  <!-- Logo -->
  <div>
    <div class="px-5 pt-6 pb-4">
      <a href="/" class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center shrink-0"
          style="background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 2px 8px rgba(99,102,241,0.35);">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div>
          <span class="font-semibold text-sm tracking-tight block leading-tight" style="color: #FFFFFF;">Rate Shield</span>
          <span style="font-size: 10px; color: #475569; letter-spacing: 0.03em;">API Gateway</span>
        </div>
      </a>
    </div>

    <!-- Divider -->
    <div class="mx-5 mb-3" style="border-top: 1px solid rgba(255,255,255,0.06);"></div>

    <!-- Nav label -->
    <p class="px-5 mb-1.5" style="font-size: 10px; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.08em;">Menu</p>

    <nav class="px-3">
      <ul class="space-y-0.5">
        <li
          *ngFor="let item of menuItems"
          (click)="onSelectPage(item.page)"
          (mouseenter)="hoveredPage = item.page"
          (mouseleave)="hoveredPage = null"
          class="flex items-center gap-3 px-3 py-2.5 rounded-xl cursor-pointer transition-all duration-150"
          [ngStyle]="selectedPage === item.page
            ? { 'background': 'rgba(99,102,241,0.18)', 'color': '#FFFFFF' }
            : hoveredPage === item.page
            ? { 'background': 'rgba(99,102,241,0.1)', 'color': '#A5B4FC' }
            : { 'color': '#6B7280' }">
          <span class="text-[15px] leading-none w-5 text-center shrink-0">{{ item.icon }}</span>
          <span class="text-[0.81rem] font-medium flex-1">{{ item.label }}</span>
          <span *ngIf="selectedPage === item.page"
            class="w-1.5 h-1.5 rounded-full shrink-0"
            style="background: #818CF8;"></span>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Footer -->
  <div class="px-5 pb-5">
    <div class="pt-4" style="border-top: 1px solid rgba(255,255,255,0.06);">
      <div
        (click)="auth.logout()"
        (mouseenter)="hoveredLogout = true"
        (mouseleave)="hoveredLogout = false"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl cursor-pointer transition-all duration-150"
        [ngStyle]="hoveredLogout ? { 'background': 'rgba(99,102,241,0.1)', 'color': '#A5B4FC' } : { 'color': '#6B7280' }">
        <span style="font-size: 15px; width: 20px; text-align: center; display: flex; align-items: center; justify-content: center;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </span>
        <span style="font-size: 0.81rem; font-weight: 500;">Sign Out</span>
      </div>
    </div>
  </div>

</div>
